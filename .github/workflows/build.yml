name: Build

on:
  push:
    paths:
      - "src/**"
      - "libs/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "src/**"
      - "libs/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle.properties"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.3

      - name: Resolve release version
        id: release-version
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          base_version="$(sed -n 's/^mod_version=//p' gradle.properties | head -n 1)"
          latest_tag="$(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName --jq '[.[].tagName | select(test("^v[0-9]+\\.[0-9]+\\.[0-9]+$"))] | first // ""')"

          if [ -z "$latest_tag" ]; then
            version="$base_version"
          else
            version="$(printf '%s\n' "$latest_tag" | sed 's/^v//')"
            major="$(printf '%s\n' "$version" | cut -d. -f1)"
            minor="$(printf '%s\n' "$version" | cut -d. -f2)"
            patch="$(printf '%s\n' "$version" | cut -d. -f3)"
            version="${major}.${minor}.$((patch + 1))"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          set -euo pipefail

          if [ -n "${RELEASE_VERSION:-}" ]; then
            gradle build --no-daemon -Pmod_version="$RELEASE_VERSION"
          else
            gradle build --no-daemon
          fi

      - name: Prepare release jar
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
        run: |
          set -euo pipefail

          jar_path=""
          for candidate in build/libs/*.jar; do
            case "$candidate" in
              *-sources.jar) continue ;;
            esac
            jar_path="$candidate"
            break
          done

          if [ -z "$jar_path" ]; then
            echo "No release jar found in build/libs" >&2
            exit 1
          fi

          mkdir -p build/release
          cp "$jar_path" "build/release/carpet-bot-api-${RELEASE_VERSION}.jar"

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.release-version.outputs.version }}
          RELEASE_TAG: ${{ steps.release-version.outputs.tag }}
        run: |
          set -euo pipefail

          gh release create "$RELEASE_TAG" \
            "build/release/carpet-bot-api-${RELEASE_VERSION}.jar" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Carpet Bot API ${RELEASE_VERSION}" \
            --notes "Automated release for version ${RELEASE_VERSION}." \
            --latest

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carpet-bot-api
          path: build/libs/*.jar
          if-no-files-found: error
